{% extends "blog/base.html" %}
{% block title %}
  Posts
{% endblock title %}
{% block content %}
  <h1>Publications</h1>
  <table>
    <thead>
        <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Publication Date</th>
        </tr>
    </thead>
    <tbody>
      <!-- posts is the data from views.py, like in cherrypy -->
      {% for post in posts %}
        <tr>
            <td> 
              <a href="{% url 'detail' post.id %}">{{ post.title }}</a> 
            </td>
            <td>{{ post.author.full_name }}</td>
            <td>{{ post.published_at }}</td>
        </tr>
        {% endfor %}
    </tbody>
  </table>
{% endblock content %}
